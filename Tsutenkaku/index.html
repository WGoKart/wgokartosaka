<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tsutenkaku Route</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="map">

<img src="images/tsutenkakuroute.jpg">

<div class="pin"
    style="top:4.7%; left:41%;"
    onmouseenter="
        showPopup(
            event,
            'HOME',
            'images/home.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:30.7%; left:60.8%;"
    onmouseenter="
        showPopup(
            event,
            'DOTONBORI(GLICO SIGN)',
            'images/glico.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:45.5%; left:71.3%;"
    onmouseenter="
        showPopup(
            event,
            'KUROMON MARKET',
            'images/kuromon-market.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:17.3%; left:54.5%;"
    onmouseenter="
        showPopup(
            event,
            'AMERICAN VILLAGE',
            'images/american-village.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:94.8%; left:70.0%;"
    onmouseenter="
        showPopup(
            event,
            'TSUTENKAKU',
            'images/tsutenkaku.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div id="popup" class="popup">

    <img id="popupImage">

    <h3 id="popupTitle"></h3>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
