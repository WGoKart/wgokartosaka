<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tsutenkaku Route</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
<div class="map-container">

    <div class="map">

        <img src="images/tsutenkakuroute.jpg">

        <div class="pin"
            style="top:6.5%; left:33.5%;"
            onmouseenter="
            showPopup(
            event,
            'HOME',
            'images/home.jpg'
            )
            "
            onmouseleave="
            hidePopup()
            ">
        </div>

        <div class="pin"
            style="top:30.5%; left:66.4%;"
            onmouseenter="
                showPopup(
                    event,
                    'DOTONBORI(GLICO SIGN)',
                    'images/glico.jpg'
                )
            "
            onmouseleave="
                hidePopup()
            ">
        </div>

        <div class="pin"
            style="top:45%; left:84%;"
            onmouseenter="
                showPopup(
                    event,
                    'KUROMON MARKET',
                    'images/kuromoku.jpg'
                )
            "
            onmouseleave="
                hidePopup()
            ">
        </div>

        <div class="pin"
            style="top:18.5%; left:56%;"
            onmouseenter="
                showPopup(
                    event,
                    'AMERICAN VILLAGE',
                    'images/USAVILLAGE.jpg'
                )
            "
            onmouseleave="
                hidePopup()
            ">
        </div>

        <div class="pin"
            style="top:90.5%; left:81.5%;"
            onmouseenter="
                showPopup(
                    event,
                    'TSUTENKAKU',
                    'images/tsutenkaku.jpg'
                )
            "
            onmouseleave="
                hidePopup()
            ">
        </div>

        <div id="popup" class="popup">

            <img id="popupImage">

            <h3 id="popupTitle"></h3>

        </div>

    </div>

</div>


<script src="script.js"></script>

</body>

</html>
