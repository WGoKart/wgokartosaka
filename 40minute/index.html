<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Experience Route</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="map">

<img src="images/40minROUTE.png">

<div class="pin"
    style="top:21.5%; left:27.5%;"
    onmouseenter="
        showPopup(
            event,
            'HOME',
            'images/home.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:74.7%; left:62.9%;"
    onmouseenter="
        showPopup(
            event,
            'SECOND TURN',
            'images/Second turn.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:74.0%; left:71.1%;"
    onmouseenter="
        showPopup(
            event,
            'SOUEMONCHO STREET',
            'images/souemoncho.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:28.0%; left:62.9%;"
    onmouseenter="
        showPopup(
            event,
            'FIRST TURN',
            'images/first turn.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:52.0%; left:54.5%;"
    onmouseenter="
        showPopup(
            event,
            'AMERICAN VILLAGE',
            'images/american-village.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div id="popup" class="popup">

    <img id="popupImage">

    <h3 id="popupTitle"></h3>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
