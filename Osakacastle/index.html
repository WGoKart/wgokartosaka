<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Osaka Route</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="map">

<img src="images/Osakacastleroute.png">

<div class="pin"
    style="top:82.0%; left:12.2%;"
    onmouseenter="
        showPopup(
            event,
            'HOME',
            'images/home.jpg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:27.1%; left:62.7%;"
    onmouseenter="
        showPopup(
            event,
            'THE THIRD TURN',
            'images/The third turn.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:87.7%; left:87.1%;"
    onmouseenter="
        showPopup(
            event,
            'FIRST TURN',
            'images/First turn.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>


<div class="pin"
    style="top:16.0%; left:93.6%;"
    onmouseenter="
        showPopup(
            event,
            'SECOND TURN',
            'images/Second turn.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:21.6%; left:80.2%;"
    onmouseenter="
        showPopup(
            event,
            'OSAKACASTLE',
            'images/Osakacastle.jpeg'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div class="pin"
    style="top:38.9%; left:7.8%;"
    onmouseenter="
        showPopup(
            event,
            'THE FOURTH TURN',
            'images/The fourth turn.png'
        )
    "
    onmouseleave="
        hidePopup()
    ">
</div>

<div id="popup" class="popup">

    <img id="popupImage">

    <h3 id="popupTitle"></h3>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
